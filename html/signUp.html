<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <title>Sign Up</title>
</head>
<body>
    <div>
        <header><h1>회원가입</h1></header>
        <p>SKALA-FRONT 회원가입을 환영합니다.</p>
        <hr>
    </div>
    <div class="signup-form">
        <form action="signUpResult.html" method="get" enctype="multipart/form-data">
            <fieldset>
                <legend>계정 정보</legend>
                    <p>
                        <label for= "userId">아이디: </label>
                        <input type="text" id= "userId" name="userId" minlength="4" maxlength="15" required placeholder="4~15자 영문/숫자">
                        <small>(필수)</small>
                    </p>
                    <p>
                        <label for="userPw">비밀번호: </label>
                        <input type="password" id="userPw" name="userPw" minlength="4" maxlength="15" required placeholder="8자 이상 입력">
                        <small>(필수)</small>
                    </p>
                    <p>
                        <label for="userEmail">이메일: </label> 
                        <input type="text" id="userEmail" name="userEmail" placeholder="example"> @
                        <select name="emailDomain">
                        <option value="direct">직접 입력</option>
                        <option value="naver.com">naver.com</option>
                        <option value="gmail.com">gmail.com</option>
                        <option value="daum.net">daum.net</option>
                        </select>
                    </p>
            </fieldset>

            <fieldset>
                <legend>개인 프로필 정보</legend>
                <p>
                    <label for="username">이름: </label>
                    <input type="text" id="userName" name="userName" required>
                </p>
                <p>
                    <label for="userBirth">생년월일: </label>
                    <input type="date" id="userBirth" name="userBirth" required>
                </p>
                <p>
                    <label for="username">전화번호: </label>
                    <input type="number" id="userPhone" name="userPhone" required>
                </p>
                <p>
                    성별:
                    <label><input type="radio" name="gender" value="male" checked>남성</label>
                    <label><input type="radio" name="gender" value="female">여성</label>
                    <label><input type="radio" name="gender" value="none">선택안함</label>
                </p>
                <p>
                    관심 분야 (중복 선택 가능): <br>
                    <label><input type="checkbox" name="interest" value="frontend">웹 프론트엔드</label><br>
                    <label><input type="checkbox" name="interest" value="uiux">UI/UX 디자인 표준</label><br>
                    <label><input type="checkbox" name="interest" value="backend">백엔드 & 데이터베이스</label><br>
                    <label><input type="checkbox" name="interest" value="devops">클라우드 & 인프라</label>
                </p>
                가입경로: 
                <select name="emailDomain">
                <option value="direct">-선택해주세요-</option>
                    <option value="company">회사</option>
                    <option value="school">학교/option>
                    <option value="friends">지인</option>
                </select>
            </fieldset>

            <fieldset>
                <legend>자기소개</legend>
                <p>
                    <label for="sns">sns: </label>
                    <input type="url" placeholder="https://instagram.com"><br>
                    <label for="portfolio">portfolio: </label>
                    <input type="file"><br>
                    <label for="intro">나를 표현하는 한 줄 소개 또는 가입 인사:</label><br>
                    <textarea name="intro" id="intro" rows="5" cols="50" placeholder="여기에 내용을 입력하세요 (최대 200자)"></textarea>
                </p>
            </fieldset>
            <br>
            <input type="submit" value="동의하고 회원가입">
            <input type="reset" value="다시 작성">
            <input type="egg" value="누르면 100만원 드림" disabled size="" maxlength="" min="" max="" multiple pattern="" placeholder="" required step=""list>
        </form>
    <a href="../index.html">⮐ HOME</a>
</body>
</html>
